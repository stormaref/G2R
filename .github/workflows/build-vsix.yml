name: Build & Publish VSIX

on:
  push:
    branches: [main, master]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build extension package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Package extension
        run: npx @vscode/vsce package --no-yarn

  release:
    name: Upload VSIX to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    # Only create a release when a version tag is pushed
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Package extension
        run: npx @vscode/vsce package --no-yarn

      - name: Upload VSIX to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.vsix"

  publish:
    name: Publish to VS Code Marketplace
    needs: build
    runs-on: ubuntu-latest
    # Only publish on pushes to main/master or version tags — not on PRs
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Publish to marketplace
        run: npx @vscode/vsce publish --no-yarn
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
